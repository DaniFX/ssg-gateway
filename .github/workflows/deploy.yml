name: Deploy Gateway

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    uses: DaniFX/ssg-workflows/.github/workflows/cloudrun-deploy.yml@main
    with:
      service_name: ssg-gateway
      ingress_flag: "--allow-unauthenticated"
      service_account_flag: "--service-account=gateway-runtime-sa@ssg-api-99ac0.iam.gserviceaccount.com"
      env_vars: |
        FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
        FIRESTORE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
        ADMIN_EMAILS=${{ secrets.ADMIN_EMAILS }}
        INTERNAL_SECRET=${{ secrets.INTERNAL_SECRET }}
        FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
    secrets: inherit
