name: Deploy Gateway

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write   # necessario per Workload Identity Federation nel reusable

jobs:
  deploy:
    uses: DaniFX/ssg-workflows/.github/workflows/cloudrun-deploy.yml@main
    with:
      service_name: ssg-gateway
      ingress_flag: "--allow-unauthenticated"
      extra_flags: "--service-account=gateway-runtime-sa@ssg-api-99ac0.iam.gserviceaccount.com"
    secrets: inherit
    # Secrets necessari nel repo:
    #   GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT_EMAIL
    #   FIREBASE_PROJECT_ID, FIREBASE_WEB_API_KEY
    #   ADMIN_EMAILS, INTERNAL_SECRET
